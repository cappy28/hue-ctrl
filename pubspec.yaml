name: hue_ctrl
description: Philips Hue Bluetooth Controller
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_blue_plus: ^1.31.5
  permission_handler: ^11.3.0
  noise_meter: ^5.0.2
  just_audio: ^0.9.36
  shared_preferences: ^2.2.2
  google_fonts: ^6.2.1
  flutter_colorpicker: ^1.0.3
  provider: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
